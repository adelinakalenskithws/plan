<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Workshop Plan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #6a0dad;
        }
        select {
            padding: 10px;
            font-size: 16px;
        }
        .plan {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h1>Dein Tagesplan</h1>

<label for="gruppe">Wähle deine Gruppe:</label><br><br>

<select id="gruppe" onchange="zeigePlan()">
    <option value="">-- Bitte auswählen --</option>
    <option value="realschule_emotions">Realschule "emotions"</option>
    <option value="realschule_electro">Realschule "electro"</option>
    <option value="realschule_social">Realschule "social"</option>
    <option value="gymnasium_minecraft">Gymnasium "minecraft"</option>
    <option value="gymnasium_digital">Gymnasium "digital"</option>
    <option value="gymnasium_social">Gymnasium "social"</option>
</select>

<div id="plan" class="plan"></div>

<script>
function zeigePlan() {
    const gruppe = document.getElementById("gruppe").value;
    const planDiv = document.getElementById("plan");

    const plaene = {
        "realschule_emotions": `
            <h2>Realschule "emotions"</h2>
            <p><b>8:15–9:45:</b> Emotionen messen im Labor</p>
            <p><b>10–11:</b> Study-Info & Marktplatz</p>
            <p><b>11:15–12:</b> Die Wissenschaftlerin - live!</p>
            <p><b>12:15–13:</b> Firmen-Workshop</p>
        `,
        "realschule_electro": `
            <h2>Realschule "electro"</h2>
            <p><b>8:15–9:45:</b> Bluetooth Box selber bauen</p>
            <p><b>10–11:</b> Firmen-Workshop</p>
            <p><b>11:15–12:</b> Die Wissenschaftlerin - live!</p>
            <p><b>12:15–13:</b> Study-Info & Marktplatz</p>
        `,
        "realschule_social": `
            <h2>Realschule "social"</h2>
            <p><b>8:15–9:45:</b> Menschen helfen im Job</p>
            <p><b>10–11:</b> Study-Info & Marktplatz</p>
            <p><b>11:15–12:</b> Die Wissenschaftlerin - live!</p>
            <p><b>12:15–13:</b> Firmen-Workshop</p>
        `,
        "gymnasium_minecraft": `
            <h2>Gymnasium "minecraft"</h2>
            <p><b>8:15–9:45:</b> Labor (tbd)</p>
            <p><b>10–11:</b> Study-Info & Marktplatz</p>
            <p><b>11:15–12:</b> Die Wissenschaftlerin - live!</p>
            <p><b>12:15–13:</b> Challenge Tekkiversum</p>
        `,
        "gymnasium_digital": `
            <h2>Gymnasium "digital"</h2>
            <p><b>8:15–9:45:</b> Motion Capture</p>
            <p><b>10–11:</b> Challenge Tekkiversum</p>
            <p><b>11:15–12:</b> Die Wissenschaftlerin - live!</p>
            <p><b>12:15–13:</b> Study-Info & Marktplatz</p>
        `,
        "gymnasium_social": `
            <h2>Gymnasium "social"</h2>
            <p><b>8:15–9:45:</b> Social Software</p>
            <p><b>10–11:</b> Menschen helfen im Job</p>
            <p><b>11:15–12:</b> Die Wissenschaftlerin - live!</p>
            <p><b>12:15–13:</b> Study-Info & Marktplatz</p>
        `
    };

    planDiv.innerHTML = plaene[gruppe] || "";
}
</script>

</body>
</html>
